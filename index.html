<!doctype html>
<html lang="en-JM">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VGJ Digital Cards</title>
  <meta name="description" content="Digital business cards for the VGJ Digital team.">
  <meta name="robots" content="noindex, follow">
  <link rel="icon" href="assets/brand/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#071420">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="assets/css/card.css">
</head>
<body>
  <main class="directory" aria-label="VGJ Digital card directory">
    <img class="directory__brand" src="assets/brand/vgj-logo-h.png" alt="VGJ Digital">
    <header class="directory__header">
      <span class="eyebrow">Digital Business Cards</span>
      <h1>VGJ Digital</h1>
      <p>Choose a team member to view their digital business card.</p>
    </header>

    <nav class="directory__grid" aria-label="Team cards">
      <a class="directory-link" href="velton/">
        <img src="assets/team/velton-gooden-jr.png" alt="Velton Gooden Jr.">
        <span><strong>Velton Gooden Jr.</strong>Founder &amp; Principal Strategist</span>
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </a>
      <a class="directory-link" href="judith/">
        <img src="assets/team/judith-gooden.png" alt="Judith Gooden">
        <span><strong>Judith Gooden</strong>Client Relations Executive</span>
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </a>
      <a class="directory-link" href="neko/">
        <img src="assets/team/neko-whittaker.png" alt="Neko Whittaker">
        <span><strong>Neko Whittaker</strong>Business Development Executive</span>
        <i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
      </a>
    </nav>
  </main>
</body>
</html>
